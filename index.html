<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>

<title>Programme d'Inhumation — Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root{
  --accent:#2563eb;
  --accent2:#10b981;
}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(120deg,#0f172a,#1e293b);
  color:#fff;
}

/* PAGES */
.page{
  width:105mm;
  min-height:148mm;
  margin:20px auto;
  background:#fff;
  color:#000;
  padding:12mm;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  page-break-inside:avoid;
  position:relative;
}

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.25;
}

.content{
  position:relative;
  z-index:2;
}

/* PHOTO */
.profile-photo{
  width:110px;
  height:110px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  border:4px solid gold;
  cursor:pointer;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* TEXT */
h1{
  text-align:center;
  font-size:22px;
  font-weight:900;
}

h2{
  margin-top:12px;
}

.editable{
  border:2px solid #000;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  font-weight:bold;
  background:#fff;
}

/* BUTTONS */
.btn{
  padding:10px;
  border:0;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin:5px 0;
}

.primary{background:var(--accent);color:#fff;}
.secondary{background:var(--accent2);color:#fff;}

.bottom{
  max-width:105mm;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

.signature{
  font-size:11px;
  color:#ccc;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page">
<img class="bg" id="bg1">
<div class="content">

<div class="profile-photo" onclick="importImg(this)">Photo</div>

<h1 contenteditable="true">Nom du défunt</h1>

<h2>Biographie</h2>
<div class="editable" contenteditable="true">
Écrire une biographie complète ici...
</div>

<button class="btn secondary" onclick="bgUpload('bg1')">Fond</button>

</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<img class="bg" id="bg2">
<div class="content">

<h2>Faire-part</h2>
<div class="editable" contenteditable="true">
Texte du faire-part...
</div>

<button class="btn secondary" onclick="bgUpload('bg2')">Fond</button>

</div>
</div>

<!-- PAGE 3 -->
<div class="page">
<img class="bg" id="bg3">
<div class="content">

<h2>Programme</h2>
<div class="editable" contenteditable="true">
Programme complet...
</div>

<button class="btn secondary" onclick="bgUpload('bg3')">Fond</button>

</div>
</div>

<!-- PAGE 4 -->
<div class="page">
<img class="bg" id="bg4">
<div class="content">

<h2>Témoignages</h2>
<div id="temoins"></div>

<button class="btn primary" onclick="addTemoin()">+ Témoignage</button>
<button class="btn secondary" onclick="bgUpload('bg4')">Fond</button>

</div>
</div>

<!-- PAGE 5 -->
<div class="page">
<img class="bg" id="bg5">
<div class="content">

<h2>Itinéraire</h2>
<div class="editable" contenteditable="true">
Localisation...
</div>

<button class="btn secondary" onclick="bgUpload('bg5')">Fond</button>

</div>
</div>

<!-- DOWNLOAD -->
<div class="bottom">
<button class="btn primary" id="download">Télécharger PDF</button>
<div class="signature">Lesfacilitateurs Groupe • WhatsApp 651475255</div>
</div>

<script>
	const CODE = "233233";

document.getElementById("download").onclick = async ()=>{

  let c = prompt("Entrez le code :");

  if(c !== CODE){
    alert("Code incorrect ❌");
    return;
  }

  await generatePDF();
};

/* IMAGE */
function importImg(el){
  let i=document.createElement("input");
  i.type="file";
  i.accept="image/*";
  i.onchange=e=>{
    let f=e.target.files[0];
    let r=new FileReader();
    r.onload=ev=>{
      el.innerHTML="<img src='"+ev.target.result+"' style='width:100%;height:100%;object-fit:cover'>";
    };
    r.readAsDataURL(f);
  };
  i.click();
}

/* BACKGROUND */
function bgUpload(id){
  let i=document.createElement("input");
  i.type="file";
  i.accept="image/*";
  i.onchange=e=>{
    let r=new FileReader();
    r.onload=ev=>{
      document.getElementById(id).src=ev.target.result;
    };
    r.readAsDataURL(e.target.files[0]);
  };
  i.click();
}

/* TEMOINS */
function addTemoin(){
  let block = document.createElement("div");
  block.style.display = "flex";
  block.style.gap = "10px";
  block.style.alignItems = "flex-start";
  block.style.marginBottom = "10px";

  // 📸 PHOTO
  let photo = document.createElement("div");
  photo.className = "profile-photo";
  photo.style.width = "70px";
  photo.style.height = "70px";
  photo.style.border = "3px solid #ccc";
  photo.innerText = "Photo";

  photo.onclick = function(){
    let input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";

    input.onchange = e=>{
      let file = e.target.files[0];
      let reader = new FileReader();

      reader.onload = ev=>{
        photo.innerHTML = "<img src='"+ev.target.result+"' style='width:100%;height:100%;object-fit:cover'>";
      };

      reader.readAsDataURL(file);
    };

    input.click();
  };

  // 📝 TEXTE
  let text = document.createElement("div");
  text.className = "editable";
  text.contentEditable = true;
  text.style.flex = "1";
  text.innerText = "Écrire témoignage...";

  block.appendChild(photo);
  block.appendChild(text);

  document.getElementById("temoins").appendChild(block);
}
