<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Programme d'Inhumation — Pro FIX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

/* PAGE */
.page{
  width:105mm;
  min-height:148mm;
  margin:20px auto;
  background:#fff;
  color:#000;
  padding:12mm;
  border-radius:12px;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* BACKGROUND */
.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.25;
  z-index:0;
}

/* CONTENT */
.content{position:relative;z-index:2}

h1{font-size:22px;text-align:center;font-weight:900}
h2{margin-top:10px}

/* EDIT */
.editable{
  border:2px solid #000;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
  background:#fff;
}

/* PHOTO */
.profile-photo{
  width:110px;
  height:110px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid gold;
  margin:auto;
  cursor:pointer;
  background:#ddd;
}

/* BUTTON */
.btn{
  padding:10px;
  border:0;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
.primary{background:#2563eb;color:#fff}
.secondary{background:#10b981;color:#fff}

/* TEMOINS */
.temoin{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.temoin .photo{
  width:70px;
  height:70px;
  border-radius:50%;
  border:2px solid #ccc;
  cursor:pointer;
  background:#eee;
}
.temoin .text{
  flex:1;
  border:2px solid #000;
  padding:8px;
  border-radius:8px;
  font-weight:bold;
}

/* FOOT */
.footer{
  text-align:center;
  font-size:11px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page">
<img class="bg" id="bg1">
<div class="content">

<div class="profile-photo" onclick="importImg(this)"></div>

<h1 contenteditable="true">Nom du défunt</h1>

<h2>Biographie</h2>
<div class="editable" contenteditable="true">Texte biographie...</div>

<button class="btn secondary" onclick="bgUpload('bg1')">Fond</button>

</div>
</div>

<!-- PAGE 2 -->
<div class="page">
<img class="bg" id="bg2">
<div class="content">

<h2>Programme</h2>
<div class="editable" contenteditable="true">Programme...</div>

<button class="btn secondary" onclick="bgUpload('bg2')">Fond</button>

</div>
</div>

<!-- PAGE 3 -->
<div class="page">
<img class="bg" id="bg3">
<div class="content">

<h2>Témoignages</h2>
<div id="temoins"></div>

<button class="btn primary" onclick="addTemoin()">Ajouter témoignage</button>

</div>
</div>

<!-- PAGE 4 -->
<div class="page">
<img class="bg" id="bg4">
<div class="content">

<h2>Itinéraire</h2>
<div class="editable" contenteditable="true">Localisation...</div>

<button class="btn secondary" onclick="bgUpload('bg4')">Fond</button>

</div>
</div>

<!-- DOWNLOAD -->
<div style="text-align:center;margin:20px;">
<button class="btn primary" onclick="downloadPDF()">Télécharger PDF</button>
</div>

<div class="footer">
Créé par ETS Lesfacilitateurs Groupe • WhatsApp +237651475255
</div>

<script>

const CODE = "233233";

/* IMAGE PROFILE */
function importImg(el){
  const input=document.createElement("input");
  input.type="file";
  input.accept="image/*";

  input.onchange=e=>{
    const file=e.target.files[0];
    const reader=new FileReader();

    reader.onload=ev=>{
      el.innerHTML="";
      const img=document.createElement("img");
      img.src=ev.target.result;
      img.style.width="100%";
      img.style.height="100%";
      img.style.objectFit="cover";
      el.appendChild(img);
    };

    reader.readAsDataURL(file);
  };

  input.click();
}

/* BACKGROUND */
function bgUpload(id){
  const input=document.createElement("input");
  input.type="file";
  input.accept="image/*";

  input.onchange=e=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      document.getElementById(id).src=ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
  };

  input.click();
}

/* TEMOINS */
function addTemoin(){

  const div=document.createElement("div");
  div.className="temoin";

  const photo=document.createElement("div");
  photo.className="photo";

  photo.onclick=()=>importImg(photo);

  const text=document.createElement("div");
  text.className="text";
  text.contentEditable=true;
  text.innerText="Témoignage...";

  div.appendChild(photo);
  div.appendChild(text);

  document.getElementById("temoins").appendChild(div);
}

/* PDF FIX COMPLET */
async function downloadPDF(){

  const c = prompt("Code d'accès :");

  if(c !== CODE){
    alert("Code incorrect ❌");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");

  const pages=document.querySelectorAll(".page");

  let i=0;

  for(const page of pages){

    const clone=page.cloneNode(true);

    clone.querySelectorAll("button").forEach(b=>b.remove());

    clone.style.position="absolute";
    clone.style.left="-9999px";
    clone.style.width="210mm";

    document.body.appendChild(clone);

    const canvas=await html2canvas(clone,{
      scale:2,
      useCORS:true,
      backgroundColor:"#fff"
    });

    const img=canvas.toDataURL("image/jpeg",1);

    if(i>0) pdf.addPage();

    pdf.addImage(img,"JPEG",0,0,210,297);

    clone.remove();

    i++;
  }

  pdf.save("programme.pdf");
}

</script>

</body>
</html>
